    <font color="#c8b79d" size="6" face="Abhaya Libre">
        <h1 align="center">Agendamentos</h1>

 </font>

        <form name="" method="" action="">
            <label for="nome">Nome:</label><br>
            <input name="nome" id="nome" type="text" placeholder="Nome completo" size="50" maxlength="50" autofocus required><br>
        <br><br>
            <label for="email">E-mail:</label><br><br>
            <input name="email" id="email" type="email" placeholder="usuario@email.com" size="50"><br><br>   
   <br>
            <label for="senha">Senha:</label><br><br>
            <input name="senha" id="senha" type="password" placeholder="Somente Números" size="50"><br>
<br><br>
             <label for="celular">Celular:</label><br><br>
            <input name="celular" id="celular" type="tel" placeholder="(99)9999-9999" size="50"> <br>
            <br> <br>

            <label for="data">Data:</label><br><br>
            <input name="data" id="data" type="date" placeholder="(99)9999-9999" size="50" ><br>
            <br> <br>
            
             <label for="hora">Hora:</label><br><br>
            <input name="hora" id="hora" type="time" placeholder="(99)9999-9999" size="50"> <br>
            <br> <br>

             <label for="aulas">Aulas:</label><br><br>
            <input name="aulas" id="aulas" type="number" placeholder="" size="50" min="1" max="5" step="1">
            <br>
            <br>
            <label for="nivel">Nível:</label><br>
            <br><select name="nivel" id="nivel"><br>
                <option value="">Selecione...</option>
                <option value="basico">Básico</option>
                <option value="intermediario">Intermediário</option>
                <option value="avancado">Avançado</option>
            </select>


             

            <br><br>
            <input type="submit" value="ENVIAR"<br>







        </form>
